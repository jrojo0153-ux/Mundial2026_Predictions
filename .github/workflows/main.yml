
name: World Cup 2026 Daily Predictor
on:
  schedule:
    - cron: '0 */6 * * *'  # Ejecutar cada 6 horas
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas xgboost catboost scikit-learn tensorflow requests
      - name: Run Pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python automated_pipeline.py
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*
          # Solo hacer commit si hay cambios detectados
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update predictions and odds $(date)"
            git push
          else
            echo "No changes to commit"
          fi
